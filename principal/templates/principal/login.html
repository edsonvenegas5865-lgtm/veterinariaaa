{% extends 'principal/base.html' %}

{% block title %}Login - Clinica Veterinaria{% endblock %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="tarjeta-servicio p-4 p-md-5">
            <h1 class="h3 fw-bold mb-3 text-center">Acceso privado</h1>
            <p class="text-muted text-center mb-4">
                Ingresa con tu usuario y contrasena para acceder al sistema.
            </p>

            {% if form.errors %}
                <div class="alert alert-danger" role="alert">
                    Usuario o contrasena incorrectos.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.username.id_for_label }}" class="form-label">Usuario</label>
                    <input type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" class="form-control" required autofocus>
                </div>

                <div class="mb-4">
                    <label for="{{ form.password.id_for_label }}" class="form-label">Contrasena</label>
                    <input type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Ingresar</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
