<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Clinica Veterinaria{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --color-principal: #0f766e;
            --color-secundario: #f59e0b;
            --color-fondo: #eefaf7;
            --color-texto: #18332f;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(20, 184, 166, 0.20), transparent 32rem),
                linear-gradient(180deg, #f7fffd 0%, var(--color-fondo) 100%);
            color: var(--color-texto);
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(90deg, #0f766e 0%, #14b8a6 100%);
        }

        .navbar .navbar-brand,
        .navbar .nav-link {
            color: #ffffff;
        }

        .navbar .nav-link {
            font-weight: 500;
            opacity: 0.92;
        }

        .navbar .nav-link:hover {
            color: #fff3c4;
            opacity: 1;
        }

        .btn-salir {
            background: transparent;
            border: 0;
            color: #ffffff;
            font-weight: 500;
            opacity: 0.92;
            padding: 0.5rem;
        }

        .btn-salir:hover {
            color: #fff3c4;
            opacity: 1;
        }

        .navbar-toggler {
            border-color: rgba(255, 255, 255, 0.55);
        }

        .contenido-principal {
            background: rgba(255, 255, 255, 0.92);
            border: 0;
            border-radius: 1.25rem;
            box-shadow: 0 1rem 2.5rem rgba(15, 118, 110, 0.14);
            overflow: hidden;
        }

        .btn-primary {
            background-color: var(--color-principal);
            border-color: var(--color-principal);
        }

        .btn-primary:hover {
            background-color: #115e59;
            border-color: #115e59;
        }

        .tarjeta-servicio {
            background: #ffffff;
            border: 1px solid rgba(15, 118, 110, 0.16);
            border-radius: 1rem;
            box-shadow: 0 0.75rem 1.5rem rgba(15, 118, 110, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .tarjeta-servicio:hover {
            transform: translateY(-4px);
            box-shadow: 0 1rem 2rem rgba(15, 118, 110, 0.16);
        }

        .badge-suave {
            background-color: #fff7ed;
            color: #9a3412;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'inicio' %}">Clinica Veterinaria</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Alternar navegacion">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'inicio' %}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'acerca' %}">Acerca de Nosotros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ubicacion' %}">Ubicacion</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'contactos' %}">Contactos</a>
                    </li>
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'panel' %}">Panel</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'mascotas' %}">Mascotas</a>
                        </li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="btn-salir">Salir</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">Login</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="contenido-principal p-4 p-md-5">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="py-4">
        <div class="container text-center text-muted small">
            Clinica Veterinaria - Sistema de Gestion
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
